name: Test package

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - src/**
      - cpp_module/**
      - tests/**
      - pyproject.toml
      - CMakeLists.txt
      - .github/workflows/test_package.yaml

jobs:
  Run-Test:
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    name: "Test package in Python ${{ matrix.python-version }}"

    runs-on: ubuntu-latest

    env:
      CXX: clang++
      CC: clang

    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.python-version }}"
          architecture: "x64"

      - name: Install GDAL
        run: |
          sudo add-apt-repository ppa:ubuntugis/ubuntugis-unstable
          sudo apt update
          sudo apt-get -y install gdal-bin libgdal-dev clang

      - name: Install pybind11
        run: |
          sudo apt-get install pybind11-dev python3-pybind11

      - uses: actions/checkout@v7

      - name: Checkout cpp-simplerasters
        uses: actions/checkout@v7
        with:
          repository: JanCaha/cpp-simplerasters
          path: deps/cpp-simplerasters

      - name: Build and install cpp-simplerasters
        run: |
          cmake -S deps/cpp-simplerasters -B deps/cpp-simplerasters/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=OFF
          cmake --build deps/cpp-simplerasters/build --parallel
          sudo cmake --install deps/cpp-simplerasters/build

      - name: Checkout cpp-viewshed-library
        uses: actions/checkout@v7
        with:
          repository: JanCaha/cpp-viewshed-library
          path: deps/cpp-viewshed-library
          submodules: true

      - name: Build and install cpp-viewshed-library (no GUI, no Qt)
        run: |
          cmake -S deps/cpp-viewshed-library -B deps/cpp-viewshed-library/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DNEEDS_QT=OFF \
            -DBUILD_GUI_APP=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_DOCUMENTATION=OFF
          cmake --build deps/cpp-viewshed-library/build --parallel
          sudo cmake --install deps/cpp-viewshed-library/build

      - name: Refresh linker cache and remove library sources
        run: |
          sudo ldconfig
          rm -rf deps

      - name: Install pip packages
        run: |
          pip install wheel build pytest

      - name: Install package
        run: |
          pip install .
          python -m build .

      - name: Run tests
        run: pytest -vv -s

      - name: List files
        run: |
          ls -l    
          cd dist
          ls -l

      - uses: actions/upload-artifact@v7
        with:
          name: viewshed-${{ matrix.python-version }}
          path: dist/viewshed*.whl
