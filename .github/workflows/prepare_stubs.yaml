name: Prepare stubs

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - src/**
      - cpp_module/**
      - pyproject.toml
      - CMakeLists.txt
      - .github/workflows/prepare_stubs.yaml

jobs:
  Prepare-Stubs:
    name: "Prepare Python stubs"

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: Install GDAL
        run: |
          sudo add-apt-repository ppa:ubuntugis/ubuntugis-unstable
          sudo apt update
          sudo apt-get -y install gdal-bin libgdal-dev

      - name: Install pybind11
        run: |
          sudo apt-get install pybind11-dev python3-pybind11

      - uses: actions/checkout@v7

      - name: Checkout cpp-simplerasters
        uses: actions/checkout@v7
        with:
          repository: JanCaha/cpp-simplerasters
          path: deps/cpp-simplerasters

      - name: Build and install cpp-simplerasters
        run: |
          cmake -S deps/cpp-simplerasters -B deps/cpp-simplerasters/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=OFF
          cmake --build deps/cpp-simplerasters/build --parallel
          sudo cmake --install deps/cpp-simplerasters/build

      - name: Checkout cpp-viewshed-library
        uses: actions/checkout@v7
        with:
          repository: JanCaha/cpp-viewshed-library
          path: deps/cpp-viewshed-library

      - name: Build and install cpp-viewshed-library (no GUI, no Qt)
        run: |
          cmake -S deps/cpp-viewshed-library -B deps/cpp-viewshed-library/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DNEEDS_QT=OFF \
            -DBUILD_GUI_APP=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_DOCUMENTATION=OFF
          cmake --build deps/cpp-viewshed-library/build --parallel
          sudo cmake --install deps/cpp-viewshed-library/build

      - name: Refresh linker cache and remove library sources
        run: |
          sudo ldconfig
          rm -rf deps

      - name: Install python dependencies
        run: |
          pip install pybind11 pybind11-stubgen black --break-system-packages

      - name: Build
        run: |
          cmake --workflow --preset workflow-release-stubs

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Changes to stubs
          file_pattern: "src/viewshed/*.pyi"
